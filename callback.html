<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#121212">
    <title>Connecting Spotify...</title>
    <link rel="stylesheet" href="styles.css?v=57">
  </head>
  <body>
    <main class="callback-screen">
      <div class="brand-mark" aria-hidden="true">S</div>
      <h1>Connecting Spotify</h1>
      <p id="callbackStatus">Finishing authorization.</p>
      <p><a id="callbackBack" href="./index.html" hidden>Back to Setflow</a></p>
    </main>

    <script>
      const SPOTIFY_CLIENT_ID = "003f1c3cbbb242b8941a383e45cb9f3b";
      const TOKEN_STORAGE_KEY = "setflow.spotifyToken";
      const statusNode = document.querySelector("#callbackStatus");
      const backLink = document.querySelector("#callbackBack");

      async function finishSpotifyLogin() {
        const params = new URLSearchParams(window.location.search);
        const error = params.get("error");
        const code = params.get("code");
        const state = params.get("state");
        const verifier = sessionStorage.getItem("setflow.spotifyVerifier");
        const expectedState = sessionStorage.getItem("setflow.spotifyState");

        if (error) throw new Error(error);
        if (!code || !verifier || state !== expectedState) {
          throw new Error("Spotify login state did not match.");
        }

        const response = await fetch("https://accounts.spotify.com/api/token", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({
            grant_type: "authorization_code",
            code,
            // Must byte-match the redirect_uri used in the authorize request,
            // which is resolved relative to the app directory (subpath-safe).
            redirect_uri: `${window.location.origin}${window.location.pathname}`,
            client_id: SPOTIFY_CLIENT_ID,
            code_verifier: verifier
          })
        });

        if (!response.ok) {
          const detail = await response.json().catch(() => ({}));
          throw new Error(detail.error_description || detail.error || "Token exchange failed.");
        }

        const data = await response.json();
        localStorage.setItem(TOKEN_STORAGE_KEY, JSON.stringify({
          accessToken: data.access_token,
          refreshToken: data.refresh_token,
          expiresAt: Date.now() + data.expires_in * 1000
        }));

        sessionStorage.removeItem("setflow.spotifyVerifier");
        sessionStorage.removeItem("setflow.spotifyState");
        window.location.replace("./index.html?spotify=connected");
      }

      finishSpotifyLogin().catch((error) => {
        statusNode.textContent = `Connection failed: ${error.message}`;
        backLink.hidden = false;
      });
    </script>
  </body>
</html>
